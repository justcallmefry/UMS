<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UMS ARI Mock → Ecwid Cart</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        margin: 2rem;
        max-width: 780px;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .note {
        font-size: 0.9rem;
        color: #555;
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        margin-top: 0.75rem;
        font-weight: 600;
      }
      input {
        width: 100%;
        max-width: 480px;
        padding: 0.4rem 0.5rem;
        margin-top: 0.2rem;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-size: 0.95rem;
      }
      input[type='number'] {
        max-width: 200px;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.5rem 1.1rem;
        border-radius: 4px;
        border: none;
        background: #2563eb;
        color: white;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: default;
      }
      pre {
        background: #0b1120;
        color: #e5e7eb;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-size: 0.8rem;
        overflow-x: auto;
      }
      .result {
        margin-top: 1.75rem;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
      }
      .cart-link {
        margin-top: 0.75rem;
      }
      .cart-link a {
        color: #2563eb;
        text-decoration: underline;
      }
      .error {
        color: #b91c1c;
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }
      .success {
        color: #166534;
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>UMS ARI Mock → Ecwid Cart</h1>
    <p class="note">
      This page simulates ARI Partstream calling
      <code>POST /api/add-from-diagram</code> on your local middleware
      (<code>http://localhost:3001</code>) and then redirects to the Ecwid
      cart URL returned.
    </p>

    <form id="ari-form">
      <label>
        OEM Part Number (SKU)
        <input
          name="oemPartNumber"
          required
          value="TEST-OEM-123"
          autocomplete="off"
        />
      </label>

      <label>
        Description
        <input
          name="description"
          required
          value="Test Diagram Part"
          autocomplete="off"
        />
      </label>

      <label>
        Price
        <input
          name="price"
          type="number"
          step="0.01"
          min="0"
          required
          value="19.99"
        />
      </label>

      <label>
        Manufacturer
        <input name="manufacturer" value="TestBrand" autocomplete="off" />
      </label>

      <label>
        Vehicle Slug
        <input
          name="vehicleSlug"
          value="2023-yamaha-yz250f"
          autocomplete="off"
        />
      </label>

      <label>
        Quantity
        <input name="quantity" type="number" min="1" step="1" value="1" />
      </label>

      <button type="submit">Send to /api/add-from-diagram</button>
    </form>

    <div class="result" id="result" hidden>
      <strong>Middleware response</strong>
      <pre id="response-json"></pre>
      <div class="cart-link" id="cart-link" hidden></div>
      <div class="error" id="error-text" hidden></div>
      <div class="success" id="success-text" hidden></div>
    </div>

    <script>
      const form = document.getElementById('ari-form');
      const resultEl = document.getElementById('result');
      const responseEl = document.getElementById('response-json');
      const cartLinkEl = document.getElementById('cart-link');
      const errorTextEl = document.getElementById('error-text');
      const successTextEl = document.getElementById('success-text');
      const submitBtn = form.querySelector('button[type="submit"]');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const payload = {
          oemPartNumber: formData.get('oemPartNumber') || '',
          description: formData.get('description') || '',
          price: Number(formData.get('price')),
          manufacturer: formData.get('manufacturer') || '',
          vehicleSlug: formData.get('vehicleSlug') || '',
          quantity: Number(formData.get('quantity') || '1'),
        };

        resultEl.hidden = false;
        cartLinkEl.hidden = true;
        errorTextEl.hidden = true;
        successTextEl.hidden = true;
        responseEl.textContent = 'Loading...';
        submitBtn.disabled = true;

        try {
          const res = await fetch('http://localhost:3001/api/add-from-diagram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const text = await res.text();
          let json;
          try {
            json = text ? JSON.parse(text) : null;
          } catch {
            json = text;
          }

          responseEl.textContent = JSON.stringify(json, null, 2);

          if (!res.ok || !json || json.ok === false) {
            errorTextEl.hidden = false;
            errorTextEl.textContent =
              (json && (json.error || json.message)) ||
              `Request failed with status ${res.status}`;
            return;
          }

          const cartUrl = json.cartUrl;
          if (cartUrl) {
            successTextEl.hidden = false;
            successTextEl.textContent =
              'Success. Click the link below to open the Ecwid cart with this part added.';

            cartLinkEl.hidden = false;
            cartLinkEl.innerHTML = `
              <a href="${cartUrl}" target="_blank" rel="noopener noreferrer">
                Open Ecwid cart in new tab
              </a>
            `;
          }
        } catch (err) {
          responseEl.textContent = '';
          errorTextEl.hidden = false;
          errorTextEl.textContent = 'Request error: ' + err.message;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
  </html>
